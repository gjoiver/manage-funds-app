name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    # This job blocks merge until it completes
    steps:
      - name: Run AI code review
        run: |
          response=$(curl --silent --show-error --max-time 900 \
            --write-out "\n%{http_code}" \
            -X POST "${{ vars.REVIEW_AGENT_URL }}/review" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.REVIEW_AGENT_SECRET }}" \
            -d '{
              "prNumber": ${{ github.event.pull_request.number }},
              "repo": "${{ github.repository }}"
            }')

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n -1)

          echo "Agent response: $body"

          if [ "$http_code" != "200" ]; then
            echo "Review agent failed with status $http_code"
            exit 1
          fi
