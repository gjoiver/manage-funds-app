<div
  class="fixed top-6 right-6 z-50 flex items-start gap-3 px-4 py-3 rounded-xl border shadow-lg max-w-sm animate-fade-in"
  [class]="colorClasses()"
>
  <svg
    class="w-5 h-5 mt-0.5 shrink-0"
    xmlns="http://www.w3.org/2000/svg"
    fill="none"
    viewBox="0 0 24 24"
    stroke="currentColor"
    stroke-width="2"
  >
    <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="iconPath()" />
  </svg>

  <span class="text-sm font-medium leading-snug">{{ message() }}</span>
</div>
