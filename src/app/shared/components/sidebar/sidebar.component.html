<header
  class="md:hidden fixed top-0 left-0 right-0 z-40 flex items-center gap-4 px-4 h-14 bg-brand-primary"
>
  <button
    (click)="toggle()"
    class="text-white p-2 rounded-lg hover:bg-white/10 transition-colors"
    aria-label="Toggle menu"
  >
    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M4 6h16M4 12h16M4 18h16"
      />
    </svg>
  </button>
  <h1 class="text-white font-bold text-base tracking-tight">{{ config.i18n.title }}</h1>
</header>

@if (isOpen()) {
  <div class="md:hidden fixed inset-0 z-40 bg-black/50" (click)="close()"></div>
}

<aside
  [class]="
    'fixed md:static md:h-full inset-y-0 left-0 z-50 w-64 bg-brand-primary flex flex-col flex-shrink-0 transition-transform duration-300 md:translate-x-0 ' +
    (isOpen() ? 'translate-x-0' : '-translate-x-full')
  "
>
  <div class="p-6 border-b border-white/10">
    <h1 class="text-white font-bold text-lg tracking-tight">{{ config.i18n.title }}</h1>
  </div>

  <nav class="flex-1 p-4 space-y-1">
    <a
      [routerLink]="config.routes.funds"
      routerLinkActive="bg-white/20 text-white font-semibold"
      class="flex items-center px-4 py-3 rounded-lg text-white/60 hover:bg-white/10 hover:text-white transition-colors text-sm"
      (click)="close()"
    >
      {{ config.i18n.funds }}
    </a>
    <a
      [routerLink]="config.routes.transactions"
      routerLinkActive="bg-white/20 text-white font-semibold"
      class="flex items-center px-4 py-3 rounded-lg text-white/60 hover:bg-white/10 hover:text-white transition-colors text-sm"
      (click)="close()"
    >
      {{ config.i18n.transactions }}
    </a>
  </nav>
</aside>
