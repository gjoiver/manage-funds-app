<div class="flex flex-col space-y-5 p-4 bg-brand-surface md:hidden">
  @if (isLoading()) {
    @for (i of [1, 2, 3]; track $index) {
      <app-card [columns]="columns()" [skeleton]="true" />
    }
  } @else if (data().length === 0 && emptyMessage()) {
    <p class="py-8 text-center text-brand-secondary italic">{{ emptyMessage() }}</p>
  } @else {
    @for (item of data(); track $index) {
      <app-card [row]="item" [columns]="columns()" />
    }
  }
</div>
