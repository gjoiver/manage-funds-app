<label class="flex items-center gap-3 cursor-pointer group">
  <div class="relative flex items-center justify-center w-5 h-5">
    <input
      type="radio"
      [name]="name()"
      [value]="value()"
      [checked]="checked()"
      (change)="onChange()"
      class="peer appearance-none w-5 h-5 rounded-full border-2 border-brand-border checked:border-brand-primary transition-colors cursor-pointer"
    />
    <div
      class="absolute w-2.5 h-2.5 rounded-full bg-brand-primary scale-0 peer-checked:scale-100 transition-transform pointer-events-none"
    ></div>
  </div>
  <span class="text-sm text-slate-700 group-hover:text-brand-primary transition-colors">
    {{ label() }}
  </span>
</label>
